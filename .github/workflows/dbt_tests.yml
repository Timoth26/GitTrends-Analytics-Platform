name: dbt Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  dbt-test-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt and dependencies
        run: make install

      - name: Configuration of AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat << 'EOF' > ~/.dbt/profiles.yml
          gittrends_dbt:
            target: dev
            outputs:
              dev:
                type: athena
                s3_staging_dir: s3://${{ secrets.S3_STAGING_DIR }}/
                region_name: eu-central-1
                database: awsdatacatalog
                schema: ${{ secrets.ATHENA_SCHEMA }}
                threads: 4
          EOF

      - name: Debug dbt connection
        run: make dbt-debug

      - name: Run dbt models
        run: make dbt-run

      - name: Run dbt tests
        run: make dbt-test
